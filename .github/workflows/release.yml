name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true

  build-and-upload:
    needs: create-release
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Create .env file
        working-directory: src/db-toolkit
        run: |
          echo "CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" > .env
          echo "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}" >> .env
      
      - name: Install dependencies
        working-directory: src/db-toolkit
        run: bun install --frozen-lockfile
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_CUSTOM_DIR: '{{ version }}'
      
      - name: Build for macOS
        if: matrix.os == 'macos-latest'
        working-directory: src/db-toolkit
        run: bun run package:mac
      
      - name: Build for Windows
        if: matrix.os == 'windows-latest'
        working-directory: src/db-toolkit
        run: bun run package:win
      
      - name: Build for Linux
        if: matrix.os == 'ubuntu-latest'
        working-directory: src/db-toolkit
        run: bun run package:linux

      - name: Upload Release Assets
        if: always()
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src/db-toolkit/release/*.dmg
            src/db-toolkit/release/*.exe
            src/db-toolkit/release/*.msi
            src/db-toolkit/release/*.AppImage
            src/db-toolkit/release/*.deb
            src/db-toolkit/release/*.zip
            src/db-toolkit/release/*.blockmap
            src/db-toolkit/release/latest*.yml
